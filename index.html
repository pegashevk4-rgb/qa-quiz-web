<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>QA Quiz</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <div class="container">
    <div id="app-root">
      <div>
        <h1>QA Quiz</h1>

        <div id="quiz">
          <div id="progress"></div>
          <p id="category-text"></p>
          <h2 id="question-text"></h2>
          <div id="options">
            <button data-index="0"></button>
            <button data-index="1"></button>
            <button data-index="2"></button>
            <button data-index="3"></button>
          </div>

          <button id="next-btn" style="display: none;">Далее</button>
        </div>

        <div id="result" style="display:none;">
          <h2>Результат</h2>
          <p id="result-text"></p>
          <button id="restart-btn">Пройти ещё раз</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
